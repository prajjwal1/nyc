name: Discover New Accounts

on:
  schedule:
    # 2x/day so the tiered BFS + suggested-for-you sweep keeps the
    # discovered-accounts pool fresh as the user's IG follows evolve.
    - cron: "0 6,18 * * *"  # 6am and 6pm UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: discover
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Restore Instagram session
        env:
          IG_SESSION_B64: ${{ secrets.IG_SESSION_B64 }}
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
        if: env.IG_SESSION_B64 != ''
        run: |
          mkdir -p ~/.config/instaloader
          echo "$IG_SESSION_B64" | base64 -d > ~/.config/instaloader/session-${IG_USERNAME:-prajfb}

      - name: Run discovery BFS
        env:
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
        run: python -m scrapers.run_discovery

      - name: Commit discovered accounts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scrapers/data/discovered_accounts.json scrapers/data/discovered_urls.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Discover new accounts $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          .github/scripts/safe-pull.sh \
            scrapers/data/discovered_accounts.json \
            scrapers/data/discovered_urls.json
          git push
