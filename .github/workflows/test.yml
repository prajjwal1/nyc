name: Tests

# Runs the scraper unit tests. These lock in the behavior of the pure
# parsing/extraction utilities (quality filters, normalize pipeline, event
# parser, substack pin-marker parser, instagram spot/roundup logic) so a
# regression is caught before it ships into a scrape.

on:
  push:
    paths:
      - "scrapers/**"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "scrapers/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r scrapers/requirements.txt
          pip install pytest

      - name: Run scraper unit tests
        run: python -m pytest scrapers/tests/ -q
