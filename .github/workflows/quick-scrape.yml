name: Quick Scrape (no Instagram)

# A fast 5-10 minute scrape that runs only the reliable, fast sources
# (Eventbrite, Substack, Luma, Partiful, generic).  Skips Instagram entirely.
# Runs every 30 min so the live site always has fresh events, even when
# the full IG-inclusive scrape is slow or broken.

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: quick-scrape
  cancel-in-progress: true  # OK to cancel; next run will pick up

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Run scrapers (no IG)
        env:
          SKIP_INSTAGRAM: "1"
        run: python -m scrapers.run_all

      - name: Pull latest before commit
        run: git pull --rebase --autostash || true

      - name: Commit updated events
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.json site/public/events.json scrapers/data/discovered_urls.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Quick scrape (no IG) $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
