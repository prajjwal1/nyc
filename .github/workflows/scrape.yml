name: Scrape Events

on:
  schedule:
    # Every 4h — full long-tail sweep. Priority accounts already refreshed
    # hourly by scrape-priority.yml, so this cron focuses on thorough
    # coverage of curated + discovered accounts with more budget per run.
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr

      - name: Install Python dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Restore Instagram session
        env:
          IG_SESSION_B64: ${{ secrets.IG_SESSION_B64 }}
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
        if: env.IG_SESSION_B64 != ''
        run: |
          mkdir -p ~/.config/instaloader
          echo "$IG_SESSION_B64" | base64 -d > ~/.config/instaloader/session-${IG_USERNAME:-prajfb}

      - name: Run scrapers
        env:
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_MAX_POSTS_PER_ACCOUNT: "12"
          IG_MAX_ACCOUNTS: "200"
          IG_SLEEP_BETWEEN_ACCOUNTS: "0.5"
          IG_TIME_BUDGET_SECONDS: "3000"  # 50 min cap; runs every 4h now
          # Mine NYC event hashtags for new author candidates + events.
          # Only enabled in the full sweep (not quick-scrape) to keep per-run
          # rate-limit risk low.
          IG_HASHTAG_DISCOVERY: "1"
          IG_HASHTAG_BUDGET_SECONDS: "300"  # 5 min cap inside the IG budget
        run: python -m scrapers.run_all

      - name: Sanity check + stats logging
        # Soft-fail: log issues but never break the pipeline. Stats appended
        # to scrapers/data/stats_history.jsonl for trend tracking.
        run: python -m scrapers.sanity_check --write-stats || true

      - name: Pull latest before commit
        # Previous: `git pull --rebase --autostash || true` silently
        # committed conflict markers into events.json when parallel crons
        # touched the same file. safe-pull.sh stashes scrape output, hard-
        # resets to origin/main, pops, and takes 'ours' on conflicts.
        run: |
          .github/scripts/safe-pull.sh \
            data/events.json site/public/events.json \
            scrapers/data/discovered_accounts.json \
            scrapers/data/discovered_urls.json \
            scrapers/data/user_affinity_accounts.json \
            scrapers/data/stats_history.jsonl \
            scrapers/data/dead_accounts.json \
            scrapers/data/account_cursors.json \
            scrapers/data/account_quality.json \
            scrapers/data/user_hashtags.json \
            scrapers/data/url_health.json \
            scrapers/data/image_hashes.json \
            scrapers/data/user_curated_sources.json

      - name: Commit updated events
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.json site/public/events.json \
            scrapers/data/discovered_accounts.json \
            scrapers/data/discovered_urls.json \
            scrapers/data/user_affinity_accounts.json \
            scrapers/data/stats_history.jsonl \
            scrapers/data/dead_accounts.json \
            scrapers/data/account_cursors.json \
            scrapers/data/account_quality.json \
            scrapers/data/user_hashtags.json \
            scrapers/data/url_health.json \
            scrapers/data/image_hashes.json \
            scrapers/data/user_interest_profile.json 2>/dev/null || true
          # Note: user_curated_sources.json + user_excluded_sources.json are
          # user-edited, not CI-generated — handled in safe-pull but not here.
          git diff --cached --quiet || git commit -m "Update events data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
