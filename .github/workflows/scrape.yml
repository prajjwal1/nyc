name: Scrape Events

on:
  schedule:
    - cron: "0 */2 * * *"  # every 2 hours
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr

      - name: Install Python dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Restore Instagram session
        env:
          IG_SESSION_B64: ${{ secrets.IG_SESSION_B64 }}
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
        if: env.IG_SESSION_B64 != ''
        run: |
          mkdir -p ~/.config/instaloader
          echo "$IG_SESSION_B64" | base64 -d > ~/.config/instaloader/session-${IG_USERNAME:-prajfb}

      - name: Run scrapers
        env:
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_MAX_POSTS_PER_ACCOUNT: "12"
          IG_MAX_ACCOUNTS: "120"
          IG_SLEEP_BETWEEN_ACCOUNTS: "0.5"
          IG_TIME_BUDGET_SECONDS: "1800"  # 30 min hard cap on IG scraping
        run: python -m scrapers.run_all

      - name: Pull latest before commit
        run: |
          git pull --rebase --autostash || true

      - name: Commit updated events
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.json site/public/events.json scrapers/data/discovered_accounts.json scrapers/data/discovered_urls.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Update events data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
