name: Scrape Events

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr

      - name: Install Python dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Restore Instagram session
        env:
          IG_SESSION_B64: ${{ secrets.IG_SESSION_B64 }}
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
        if: env.IG_SESSION_B64 != ''
        run: |
          mkdir -p ~/.config/instaloader
          echo "$IG_SESSION_B64" | base64 -d > ~/.config/instaloader/session-${IG_USERNAME:-prajfb}

      - name: Run scrapers
        env:
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
        run: python -m scrapers.run_all

      - name: Commit updated events
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.json site/public/events.json
          git diff --cached --quiet || git commit -m "Update events data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
